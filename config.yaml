data:
  raw_path: data/emails.csv
  train_path: data/train.csv
  test_path: data/test.csv
  text_column: text
  label_column: spam
  test_size: 0.2
  random_state: 42

preprocessing:
  lowercase: true
  remove_punctuation: true
  remove_stopwords: true
  stemming: true
  min_word_length: 2

features:
  method: bow          # options: tfidf, bow
  max_features: 8000
  ngram_range: [1, 3]  # unigrams, bigrams, and trigrams
  sublinear_tf: true

models:
  - name: naive_bayes
    type: MultinomialNB
    params:
      alpha: 0.1

  - name: logistic_regression
    type: LogisticRegression
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42

  - name: svm
    type: LinearSVC
    params:
      C: 1.0
      max_iter: 2000
      random_state: 42

  - name: random_forest
    type: RandomForestClassifier
    params:
      n_estimators: 100
      random_state: 42

training:
  best_model: svm       # switched to SVM (best performer)
  scoring_metric: f1

paths:
  model_dir: models/
  vectorizer_path: models/vectorizer.pkl
  model_path: models/spam_classifier.pkl
  reports_dir: reports/